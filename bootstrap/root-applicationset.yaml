apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      # This becomes 'cluster-fl5kt-config' automatically
      name: '{{path.basename}}-config'
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # THE FIX: Anchor the build to the root (.) 
        # This solves the '../../../../' jumping into /tmp issue.
        path: . 
        kustomize:
          # {{path}} resolves to the ACTUAL folder name (e.g., clusters/cluster-fl5kt)
          # We are passing a real string to Kustomize, not a variable.
          path: '{{path}}/overlays/cluster-config'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
