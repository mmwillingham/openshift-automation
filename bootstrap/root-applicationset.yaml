apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      name: '{{path.basename}}-config'
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # Anchoring to the root (.) allows Kustomize to find the /components folder 
        path: . 
        kustomize:
          # Uses the actual folder name discovered by the generator (e.g., clusters/cluster-fl5kt)
          path: '{{path}}/overlays/cluster-config'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=false
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
