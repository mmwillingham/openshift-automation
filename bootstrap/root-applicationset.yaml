apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      # This automatically becomes 'cluster-fl5kt-config'
      name: '{{path.basename}}-config'
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # THE FIX: Anchor the build to the REPOSITORY ROOT
        path: . 
        kustomize:
          # {{path}} is the actual folder name found in Git (e.g., clusters/cluster-fl5kt)
          # No more ${CLUSTER_NAME} variables in this path!
          path: '{{path}}/overlays/cluster-config'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
