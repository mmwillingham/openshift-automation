apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      # Resolves to: cluster-fl5kt-config
      name: '{{path.basename}}-config'
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # Start at the root (.) so Kustomize can see the /components folder
        path: . 
        kustomize:
          # Resolves to: clusters/cluster-fl5kt/overlays/cluster-config
          # This replaces the broken ${CLUSTER_NAME} variable with a real path
          path: '{{path}}/overlays/cluster-config'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
