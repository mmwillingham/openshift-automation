apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      name: '{{path.basename}}-config'
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # This makes the ENTIRE REPO the "root" for Kustomize
        path: . 
        kustomize:
          # This tells Argo which specific overlay to run the build command on
          path: '{{path}}/overlays/cluster-config'
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
