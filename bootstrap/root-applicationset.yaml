apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  # The generator finds the directories in your repo
  generators:
    - git:
        repoURL: https://github.com/mmwillingham/openshift-automation
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      # Use the folder name (e.g., cluster-fl5kt) to name the application
      name: '{{path.basename}}-config'
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: https://github.com/mmwillingham/openshift-automation
        targetRevision: HEAD
        # This points Argo CD directly to the overlay, fixing the pathing issue
        path: '{{path}}/overlays/cluster-config'
      destination:
        # Since GitOps is local to each cluster, we use the local service address
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
