apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: ${GITOPS_REPO}
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      name: '0-{{path.basename}}-bootstrap' # Named 'bootstrap' to show it's the parent
    spec:
      project: default
      source:
        repoURL: ${GITOPS_REPO}
        targetRevision: HEAD
        # Point to the cluster folder (e.g., clusters/cluster-fl5kt)
        # This will pick up your clusters/cluster-fl5kt/kustomization.yaml
        path: '{{path}}' 
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=false
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
