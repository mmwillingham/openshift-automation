apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  resourceTrackingMethod: annotation
  # Native Kustomize flags remain here
  kustomizeBuildOptions: --enable-alpha-plugins --load-restrictor LoadRestrictionsNone
  extraConfig:
    resource.compareoptions: |
      ignoreAggregatedRoles: true
  server:
    autoscale:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    insecure: true
    route:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
  # Keep your custom health checks (Certificate, Route, Subscription, etc.)
  resourceHealthChecks:
    - group: argoproj.io
      kind: Application
      check: |
        # ... (keep your existing Lua script here)
    # ... (keep the rest of your health checks)
  repo:
    # --- SIDECAR REMOVED ---
    # --- VOLUMES REMOVED ---
    env:
      - name: KUSTOMIZE_PLUGIN_HOME
        value: /etc/kustomize/plugin
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
  # Keep the rest of your SSO, RBAC, and ResourceExclusions
  sso:
    dex:
      openShiftOAuth: true
    provider: dex
  rbac:
    defaultPolicy: 'role:none'
    policy: |
      p, role:none, *, *, */*, deny
      g, system:cluster-admins, role:admin