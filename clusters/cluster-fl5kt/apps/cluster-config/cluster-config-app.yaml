apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-config
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/mmwillingham/openshift-automation
    targetRevision: HEAD
    # Anchor to the root so it can find /components/cluster-config
    path: . 
    kustomize:
      # Use this field to tell Argo where the overlay is relative to the root
      path: clusters/cluster-fl5kt/overlays/cluster-config
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m